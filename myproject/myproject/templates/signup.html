{% extends 'base.html' %}
{% block content %}
<h2>Signup</h2>
<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" class="form-control mb-2">
    <input type="password" name="password" class="form-control mb-2">
    <button class="btn btn-success">Signup</button>
</form>
{% endblock %}
