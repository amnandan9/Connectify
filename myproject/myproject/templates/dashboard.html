{% extends 'base.html' %}

{% block content %}

<h3 class="mb-3">My Applications</h3>

<div class="row">
    {% for app in applications %}
    <div class="col-md-6">
        <div class="card p-3 mb-3">
            <h5>{{ app.job.title }}</h5>
            <p>{{ app.job.location }}</p>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
