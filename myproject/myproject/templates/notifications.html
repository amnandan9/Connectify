{% extends 'base.html' %}

{% block content %}

<h3 class="mb-3">Notifications</h3>

{% for note in notifications %}
<div class="card p-3 mb-2">
    {{ note.message }}
    <br>
    <small class="text-muted">{{ note.created_at|date:"M d, H:i" }}</small>
</div>
{% empty %}
<p>No notifications</p>
{% endfor %}

{% endblock %}
