{% extends 'base.html' %}

{% block content %}

<h3 class="mb-4">Explore Jobs</h3>

<form method="GET" class="row mb-4">
    <div class="col-md-5">
        <input type="text" name="q" class="form-control" placeholder="Search jobs">
    </div>
    <div class="col-md-5">
        <input type="text" name="location" class="form-control" placeholder="Location">
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary w-100">Search</button>
    </div>
</form>

{% for job in jobs %}
<div class="card p-4 mb-3">

    <h5>{{ job.title }}</h5>
    <p class="text-muted">{{ job.location }}</p>
    <p>{{ job.description|truncatewords:20 }}</p>

    <div class="mt-2">
        {% if job.id in applied_jobs %}
            <button class="btn btn-secondary" disabled>Applied</button>
        {% else %}
            <form method="POST" action="{% url 'apply_job' job.id %}">
                {% csrf_token %}
                <button class="btn btn-success">Apply</button>
            </form>
        {% endif %}
    </div>

</div>
{% endfor %}

{% endblock %}
