{% extends 'base.html' %}

{% block content %}

<div class="container chat-container">

    <!-- 🔹 Header -->
    <div class="chat-header">
        <div class="d-flex align-items-center">
            <img src="https://via.placeholder.com/40" class="chat-avatar">
            <h6 class="ms-2 mb-0">{{ other_user.username }}</h6>
        </div>
    </div>

    <!-- 🔹 Chat Area -->
    <div class="chat-box" id="chat-box">

        {% for msg in messages %}

            {% if msg.sender == user %}
                <!-- YOUR MESSAGE -->
                <div class="chat-row right">
                    <div class="chat-bubble sent">
                        {{ msg.text }}
                        <div class="chat-time">
                            {{ msg.created_at|date:"H:i" }}
                        </div>
                    </div>
                </div>
            {% else %}
                <!-- OTHER USER -->
                <div class="chat-row left">

                    <!-- Avatar -->
                    <img src="https://via.placeholder.com/35" class="chat-avatar-small">

                    <div class="chat-bubble received">
                        {{ msg.text }}
                        <div class="chat-time">
                            {{ msg.created_at|date:"H:i" }}
                        </div>
                    </div>
                </div>
            {% endif %}

        {% endfor %}

    </div>

    <!-- 🔹 Input -->
    <form method="POST" class="chat-input">
        {% csrf_token %}
        <div class="d-flex align-items-center">
            <input type="text" name="text" placeholder="Message..." required>
            <button>Send</button>
        </div>
    </form>

</div>

<!-- 🔽 Auto Scroll -->
<script>
    const chatBox = document.getElementById("chat-box");
    chatBox.scrollTop = chatBox.scrollHeight;
</script>

{% endblock %}
