{% extends 'base.html' %}

{% block content %}

<h2>Feed</h2>

<form method="POST" action="{% url 'create_post' %}">
    {% csrf_token %}
    <textarea name="content" class="form-control mb-2"></textarea>
    <button class="btn btn-primary">Post</button>
</form>

{% for post in posts %}
<div class="card p-3 mt-3">
    <b>{{ post.user.username }}</b>
    <p>{{ post.content }}</p>
</div>
{% endfor %}

{% endblock %}
