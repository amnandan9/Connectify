{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-primary text-white py-4 text-center">
                <h2 class="fw-800 mb-0">Post a Job Opportunity</h2>
                <p class="opacity-75 mb-0">Help your network find their next career move</p>
            </div>
            
            <div class="card-body p-5">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-600">Job Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Senior Frontend Developer" required>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-600">Location</label>
                            <input type="text" name="location" class="form-control" placeholder="e.g. Remote / New York, NY" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-600">Salary (Yearly)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">$</span>
                                <input type="number" name="salary" class="form-control border-start-0" placeholder="e.g. 120000" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-600">Job Description</label>
                        <textarea name="description" class="form-control" rows="6" placeholder="Describe the role, responsibilities, and requirements..." required style="resize: none;"></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fa-solid fa-paper-plane me-2"></i>Post Job Now
                        </button>
                        <a href="{% url 'job_list' %}" class="btn btn-link text-muted text-decoration-none">Cancel and Go Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
